<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TaleCode UK — AR Experience</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
#loading {
position:fixed; inset:0; z-index:9999;
background:linear-gradient(160deg,#0d1b3e,#1a0a0a);
display:flex; flex-direction:column;
align-items:center; justify-content:center; text-align:center;
}
#loading h2 { color:#c8a951; font-size:22px; margin-bottom:10px; }
#loading p { color:#aaa; font-size:14px; }
.spinner {
width:40px; height:40px;
border:3px solid rgba(200,169,81,0.2);
border-top-color:#c8a951; border-radius:50%;
animation:spin 1s linear infinite; margin:20px auto;
}
@keyframes spin { to{transform:rotate(360deg)} }
#instruction {
position:fixed; bottom:20px; left:0; right:0;
text-align:center; z-index:100; pointer-events:none;
}
#instruction p { color:#c8a951; font-size:15px; }
</style>
</head>
<body>

<div id="loading">
<h2>🏰 TaleCode UK</h2>
<div class="spinner"></div>
<p>Starting camera...</p>
</div>

<div id="instruction">
<p>📱 Point camera at your image to begin</p>
</div>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
color-space="sRGB"
renderer="colorManagement: true; physicallyCorrectLights: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- TARGET 0 — Chapter 1 -->
<a-entity mindar-image-target="targetIndex: 0">
<a-plane color="#0d1b3e" opacity="0.85" width="0.8" height="0.5" position="0 0 0.05"></a-plane>
<a-text value="🏰 THE SACRED STONE" align="center" color="#c8a951" width="1.6" position="0 0.12 0.1"></a-text>
<a-text value="843 AD — Edinburgh Castle" align="center" color="#ffffff" width="1.3" position="0 -0.02 0.1"></a-text>
<a-text value="Every King of Scotland\ncrowned upon this stone." align="center" color="#dddddd" width="1.2" position="0 -0.18 0.1"></a-text>
</a-entity>

<!-- TARGET 1 — Chapter 2 -->
<a-entity mindar-image-target="targetIndex: 1">
<a-plane color="#1a0000" opacity="0.85" width="0.8" height="0.5" position="0 0 0.05"></a-plane>
<a-text value="⚔️ THE THEFT" align="center" color="#ff4444" width="1.6" position="0 0.12 0.1"></a-text>
<a-text value="1296 — Edward I, Hammer of Scots" align="center" color="#ffffff" width="1.3" position="0 -0.02 0.1"></a-text>
<a-text value="Stolen. Carried to London.\n700 years of silence." align="center" color="#dddddd" width="1.2" position="0 -0.18 0.1"></a-text>
</a-entity>

<!-- TARGET 2 — Chapter 3 -->
<a-entity mindar-image-target="targetIndex: 2">
<a-plane color="#00051a" opacity="0.85" width="0.8" height="0.5" position="0 0 0.05"></a-plane>
<a-text value="🎓 THE REBELLION" align="center" color="#4499ff" width="1.6" position="0 0.12 0.1"></a-text>
<a-text value="Christmas Night, 1950" align="center" color="#ffffff" width="1.3" position="0 -0.02 0.1"></a-text>
<a-text value="4 students broke into\nWestminster Abbey." align="center" color="#dddddd" width="1.2" position="0 -0.18 0.1"></a-text>
</a-entity>

<!-- TARGET 3 — Chapter 4 -->
<a-entity mindar-image-target="targetIndex: 3">
<a-plane color="#001a0a" opacity="0.85" width="0.8" height="0.5" position="0 0 0.05"></a-plane>
<a-text value="🏴󠁧󠁢󠁳󠁣󠁴󠁿 COMING HOME" align="center" color="#00ee77" width="1.6" position="0 0.12 0.1"></a-text>
<a-text value="November 1996 — After 700 years" align="center" color="#ffffff" width="1.3" position="0 -0.02 0.1"></a-text>
<a-text value="Scotland exhaled.\nThe stone came home." align="center" color="#dddddd" width="1.2" position="0 -0.18 0.1"></a-text>
</a-entity>

<!-- TARGET 4 — Chapter 5 -->
<a-entity mindar-image-target="targetIndex: 4">
<a-plane color="#0a0800" opacity="0.9" width="0.85" height="0.6" position="0 0 0.05"></a-plane>
<a-text value="🎁 YOUR REWARD!" align="center" color="#c8a951" width="1.6" position="0 0.17 0.1"></a-text>
<a-text value="USE CODE AT CHECKOUT:" align="center" color="#aaaaaa" width="1.2" position="0 0.03 0.1"></a-text>
<a-text value="DESTINY15" align="center" color="#ffffff" width="2.0" position="0 -0.1 0.1"></a-text>
<a-text value="15% off your next TaleCode kit!" align="center" color="#c8a951" width="1.2" position="0 -0.23 0.1"></a-text>
</a-entity>

</a-scene>

<script>
document.querySelector('a-scene').addEventListener('loaded', function() {
setTimeout(function() {
document.getElementById('loading').style.display = 'none';
}, 2000);
});
</script>

</body>
</html>
