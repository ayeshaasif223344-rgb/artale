<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TaleCode UK — AR Experience</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:Georgia,serif; }

#loading {
position:fixed; inset:0; z-index:9999;
background:linear-gradient(160deg,#0d1b3e,#1a0a0a);
display:flex; flex-direction:column;
align-items:center; justify-content:center; text-align:center;
}
#loading h2 { color:#c8a951; font-size:24px; margin-bottom:10px; }
#loading p { color:#aaa; font-size:14px; }
.spinner {
width:40px; height:40px;
border:3px solid rgba(200,169,81,0.2);
border-top-color:#c8a951; border-radius:50%;
animation:spin 1s linear infinite; margin:20px auto;
}
@keyframes spin { to{transform:rotate(360deg)} }

#scan-msg {
position:fixed; bottom:30px; left:0; right:0;
text-align:center; z-index:100;
color:#c8a951; font-size:15px;
animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* Film overlay */
#film {
position:fixed; inset:0; z-index:50;
display:none; flex-direction:column;
align-items:center; justify-content:center;
background:rgba(0,0,0,0.75);
}

#scene-image {
width:88vw; max-width:380px;
border-radius:16px;
border:2px solid rgba(200,169,81,0.5);
box-shadow:0 0 40px rgba(200,169,81,0.3);
animation:zoomIn 1s ease forwards;
object-fit:cover;
}
@keyframes zoomIn {
from { transform:scale(0.85); opacity:0; }
to { transform:scale(1); opacity:1; }
}

#chapter-badge {
position:absolute; top:24px; left:50%; transform:translateX(-50%);
background:rgba(13,27,62,0.9);
border:1px solid #c8a951; border-radius:20px;
padding:6px 18px; color:#c8a951; font-size:12px; letter-spacing:2px;
}

#chapter-title {
margin-top:18px;
font-size:20px; letter-spacing:3px;
text-align:center;
}

#subtitle {
margin-top:6px;
color:#aaa; font-size:13px; text-align:center;
}

#progress-bar {
width:80vw; max-width:340px;
height:3px; background:rgba(255,255,255,0.1);
border-radius:3px; margin-top:16px; overflow:hidden;
}
#progress-fill {
height:100%; width:0%;
background:#c8a951;
}

/* Reward */
#reward {
position:fixed; inset:0; z-index:200;
background:rgba(0,0,0,0.95);
display:none; flex-direction:column;
align-items:center; justify-content:center;
text-align:center; padding:30px;
}
#reward .icon { font-size:64px; margin-bottom:12px; }
#reward h2 { color:#c8a951; font-size:26px; margin-bottom:8px; }
#reward .code {
color:#fff; font-size:44px; font-weight:bold;
letter-spacing:5px; margin:16px 0;
text-shadow:0 0 20px rgba(200,169,81,0.8);
}
#reward p { color:#aaa; font-size:14px; }
#reward .disc { color:#c8a951; font-size:17px; margin-top:8px; }
</style>
</head>
<body>

<div id="loading">
<h2>🏰 TaleCode UK</h2>
<div class="spinner"></div>
<p>Starting camera...</p>
</div>

<div id="scan-msg">📱 Point camera at your TaleCode tin</div>

<!-- Film UI -->
<div id="film">
<div id="chapter-badge">Chapter 1 of 5</div>
<img id="scene-image" src="" alt=""/>
<div id="chapter-title" style="color:#c8a951;">THE SACRED STONE</div>
<div id="subtitle">843 AD</div>
<div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- Reward screen -->
<div id="reward">
<div class="icon">🎁</div>
<h2>YOUR REWARD!</h2>
<p>Use this code at checkout:</p>
<div class="code">DESTINY15</div>
<div class="disc">15% off your next TaleCode kit!</div>
<br>
<p style="color:#555;font-size:12px;">Thank you for exploring Scottish history!</p>
</div>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
color-space="sRGB"
renderer="colorManagement: true; physicallyCorrectLights: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
<a-entity mindar-image-target="targetIndex: 0">
<a-ring color="#c8a951" radius-inner="0.08" radius-outer="0.1"
rotation="-90 0 0" position="0 0 0"
animation="property: rotation; to: -90 360 0; dur: 4000; easing: linear; loop: true">
</a-ring>
</a-entity>
</a-scene>

<script>
const chapters = [
{
title: "THE SACRED STONE",
subtitle: "843 AD — Edinburgh Castle",
image: "./chapter1.jpg",
color: "#c8a951",
speech: "843 AD. Deep within Edinburgh Castle, an ancient stone held the fate of Scotland. Every King was crowned upon the Stone of Destiny. For five hundred years, it carried the weight of a nation's soul."
},
{
title: "THE THEFT",
subtitle: "1296 — Edward I",
image: "./chapter2.jpg",
color: "#ff4444",
speech: "1296. Edward the First of England, the Hammer of Scots, invaded Scotland. He seized the sacred stone and carried it to London. Seven hundred years of silence began. Scotland wept."
},
{
title: "THE REBELLION",
subtitle: "Christmas Night, 1950",
image: "./chapter3.jpg",
color: "#4499ff",
speech: "Christmas Night, 1950. Four brave Scottish students broke into Westminster Abbey. They stole back the Stone of Destiny. For a brief moment, Scotland exhaled. The stone was home."
},
{
title: "COMING HOME",
subtitle: "November 1996",
image: "./chapter4.jpg",
color: "#00ee77",
speech: "November 1996. After seven hundred years of exile, the British Government finally returned the Stone of Destiny to Scotland. Crowds lined the streets of Edinburgh. A nation reclaimed its heart."
},
{
title: "YOUR REWARD!",
subtitle: "You completed the story!",
image: "./chapter5.jpg",
color: "#c8a951",
speech: "Congratulations! You have uncovered the full story of the Stone of Destiny. As a reward for your curiosity and adventure, use code DESTINY15 at checkout for fifteen percent off your next TaleCode kit!"
}
];

let currentChapter = 0;
let chapterTimer = null;
let isRunning = false;
const DURATION = 18000;

function speak(text) {
if (!window.speechSynthesis) return;
window.speechSynthesis.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'en-GB';
utter.rate = 0.88;
utter.pitch = 1.0;
utter.volume = 1.0;
window.speechSynthesis.speak(utter);
}

function showChapter(index) {
if (index >= chapters.length) {
showReward();
return;
}

currentChapter = index;
const ch = chapters[index];

// Update UI
document.getElementById('chapter-badge').textContent = `Chapter ${index + 1} of 5`;
document.getElementById('scene-image').src = ch.image;
document.getElementById('scene-image').style.animation = 'none';
setTimeout(() => {
document.getElementById('scene-image').style.animation = 'zoomIn 1s ease forwards';
}, 10);
document.getElementById('chapter-title').textContent = ch.title;
document.getElementById('chapter-title').style.color = ch.color;
document.getElementById('subtitle').textContent = ch.subtitle;

// Progress bar
const fill = document.getElementById('progress-fill');
fill.style.transition = 'none';
fill.style.width = '0%';
fill.style.background = ch.color;
setTimeout(() => {
fill.style.transition = `width ${DURATION}ms linear`;
fill.style.width = '100%';
}, 100);

// Speak
speak(ch.speech);

clearTimeout(chapterTimer);
chapterTimer = setTimeout(() => showChapter(index + 1), DURATION);
}

function showReward() {
window.speechSynthesis && window.speechSynthesis.cancel();
document.getElementById('film').style.display = 'none';
document.getElementById('reward').style.display = 'flex';
speak("Congratulations! Use code DESTINY15 for fifteen percent off your next TaleCode kit!");
}

function startFilm() {
if (isRunning) return;
isRunning = true;
document.getElementById('scan-msg').style.display = 'none';
document.getElementById('film').style.display = 'flex';
showChapter(0);
}

function stopFilm() {
isRunning = false;
clearTimeout(chapterTimer);
window.speechSynthesis && window.speechSynthesis.cancel();
document.getElementById('film').style.display = 'none';
document.getElementById('reward').style.display = 'none';
document.getElementById('scan-msg').style.display = 'block';
}

document.querySelector('a-scene').addEventListener('loaded', function() {
setTimeout(() => {
document.getElementById('loading').style.display = 'none';
}, 2000);
});

const target = document.querySelector('[mindar-image-target]');
target.addEventListener('targetFound', startFilm);
target.addEventListener('targetLost', stopFilm);
</script>

</body>
</html>
