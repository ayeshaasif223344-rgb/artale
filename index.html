<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
 <title>TaleCode UK — Edinburgh Castle AR</title>
 <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
 <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
 
 <style>
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
 body{background:#000;font-family:Georgia,serif;overflow:hidden;}

 /* Splash Screen */
 #splash{position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,#0d1b3e,#1a0a0a);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
 .sp-icon{font-size:72px;margin-bottom:16px;}
 .sp-title{font-size:28px;color:#c8a951;letter-spacing:4px;}
 .sp-btn{background:linear-gradient(135deg,#c8a951,#a07830);color:#0d1b3e;border:none;padding:18px 48px;font-size:20px;font-weight:bold;border-radius:50px;cursor:pointer;box-shadow:0 0 40px rgba(200,169,81,.6);margin-top:30px;}

 /* Overlay UI */
 #ui-layer{position:fixed;inset:0;pointer-events:none;z-index:100;}
 #ch-label{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:10px 20px;color:#c8a951;border-radius:30px;font-size:12px;letter-spacing:2px;display:none;border:1px solid #c8a951;}
 #prog-bar{position:absolute;top:0;left:0;height:4px;background:#c8a951;width:0%;transition:width 0.5s;}
 </style>
</head>

<body style="margin: 0; overflow: hidden;">

 <div id="splash">
 <div class="sp-icon"> </div>
 <div class="sp-title">TALECODE UK</div>
 <p style="color:#aaa; margin-top:10px;">Edinburgh Castle — AR Experience</p>
 <button class="sp-btn" id="start-btn"> Start AR Experience</button>
 </div>

 <div id="ui-layer">
 <div id="prog-bar"></div>
 <div id="ch-label">CHAPTER 1</div>
 </div>

 <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" vr-mode-ui="enabled: false">
 
 <a-assets id="assets-list">
 </a-assets>

 <a-marker preset="hiro" id="main-marker">
 <a-video id="ar-video-display" src="" width="1.6" height="0.9" rotation="-90 0 0" position="0 0 0"></a-video>
 </a-marker>

 <a-entity camera></a-entity>
 </a-scene>

 <script>
 const shots =;

 let currentIdx = 0;
 let videoElement = null;

 document.getElementById('start-btn').addEventListener('click', function() {
 document.getElementById('splash').style.display = 'none';
 document.getElementById('ch-label').style.display = 'block';
 initAR();
 });

 function initAR() {
 loadShot(0);
 }

 function loadShot(index) {
 if (index >= shots.length) {
 alert("Story Completed!");
 return;
 }

 currentIdx = index;
 const s = shots[index];
 
 // 1. Purane assets clear karein memory bachane ke liye
 const assets = document.getElementById('assets-list');
 assets.innerHTML = ''; 

 // 2. Naya video element banayein
 videoElement = document.createElement('video');
 videoElement.id = 'active-video';
 videoElement.src = s.id; // GitHub file name
 videoElement.setAttribute('preload', 'auto');
 videoElement.setAttribute('crossorigin', 'anonymous');
 videoElement.setAttribute('playsinline', ''); // iOS fix
 videoElement.setAttribute('webkit-playsinline', '');
 videoElement.muted = true; // Autoplay fix
 videoElement.loop = false;
 
 assets.appendChild(videoElement);

 // 3. AR display ko update karein
 const arDisplay = document.getElementById('ar-video-display');
 arDisplay.setAttribute('src', '#active-video');

 // 4. Play video aur UI update
 videoElement.play();
 document.getElementById('ch-label').innerText = s.label;
 
 // Progress bar logic
 let progress = 0;
 const progBar = document.getElementById('prog-bar');
 const interval = setInterval(() => {
 progress = (videoElement.currentTime / videoElement.duration) * 100;
 progBar.style.width = progress + '%';
 }, 100);

 // Jab video khatam ho toh agli load karein
 videoElement.onended = () => {
 clearInterval(interval);
 loadShot(index + 1);
 };
 }
 </script>
</body>
</html>
