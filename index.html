<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TaleCode UK — AR Experience</title>

  <!-- MindAR + A-Frame libraries -->

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family: Georgia, serif; overflow: hidden; }

    /* ── LOADING SCREEN ── */
    #loading {
      position:fixed; inset:0; z-index:9999;
      background: linear-gradient(160deg,#0d1b3e,#1a0a0a);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:30px;
    }
    #loading .icon { font-size:60px; margin-bottom:16px; animation: float 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    #loading h2 { color:#c8a951; font-size:22px; letter-spacing:2px; margin-bottom:8px; }
    #loading p  { color:#aaa; font-size:14px; margin-bottom:30px; }
    .spinner {
      width:40px; height:40px; border:3px solid rgba(200,169,81,0.2);
      border-top-color:#c8a951; border-radius:50%;
      animation: spin 1s linear infinite; margin-bottom:16px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    #loading small { color:#666; font-size:12px; }

    /* ── INSTRUCTION OVERLAY ── */
    #instruction {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding:20px 24px 32px; text-align:center;
      pointer-events:none;
    }
    #instruction p {
      color:#c8a951; font-size:15px; letter-spacing:1px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    /* ── SCENE LABEL ── */
    #scene-label {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      z-index:100; background:rgba(13,27,62,0.8);
      border:1px solid rgba(200,169,81,0.4);
      border-radius:20px; padding:8px 20px;
      color:#c8a951; font-size:13px; letter-spacing:2px;
      display:none;
    }

    /* ── CLOSE BTN ── */
    #close-btn {
      position:fixed; top:16px; right:16px; z-index:200;
      background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2);
      color:#fff; width:40px; height:40px; border-radius:50%;
      font-size:18px; cursor:pointer; display:none;
      align-items:center; justify-content:center;
    }
  </style>

</head>
<body>

<!-- Loading -->

<div id="loading">
  <div class="icon">🏰</div>
  <h2>TaleCode UK</h2>
  <p>Edinburgh Castle AR Experience</p>
  <div class="spinner"></div>
  <small>Starting camera...</small>
</div>

<!-- Close button -->

<button id="close-btn" onclick="window.location.href='../talecode-story/'">✕</button>

<!-- Scene label -->

<div id="scene-label" id="scene-label">Chapter 1 of 5</div>

<!-- Instruction -->

</div>

<!-- ══ A-FRAME AR SCENE ══ -->

<a-scene
mindar-image=“imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;”
color-space=“sRGB”
renderer=“colorManagement: true, physicallyCorrectLights”
vr-mode-ui=“enabled: false”
device-orientation-permission-ui=“enabled: false”>

  <a-assets>
    <!-- Preload fonts -->
  </a-assets>

<a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

<script>
  // Hide loading when AR is ready
  const sceneEl = document.querySelector('a-scene');
  sceneEl.addEventListener('loaded', () => {
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('close-btn').style.display = 'flex';
    }, 1500);
  });

  // Show which chapter is active
  const targets = document.querySelectorAll('[mindar-image-target]');
  const labels = [
    'Chapter 1 — The Sacred Stone',
    'Chapter 2 — The Theft',
    'Chapter 3 — The Rebellion',
    'Chapter 4 — Coming Home',
    'Chapter 5 — Your Reward! 🎁'
  ];
  const labelEl = document.getElementById('scene-label');
  const instrEl = document.getElementById('instruction');

  targets.forEach((target, i) => {
    target.addEventListener('targetFound', () => {
      labelEl.textContent = labels[i];
      labelEl.style.display = 'block';
      instrEl.style.display = 'none';
    });
    target.addEventListener('targetLost', () => {
      labelEl.style.display = 'none';
      instrEl.style.display = 'block';
    });
  });
</script>
